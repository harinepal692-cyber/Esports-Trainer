<!DOCTYPE html>
<html>
<head>
<title>Pro Trainer Game</title>
<link rel="stylesheet" href="style.css">

<style>
body {
    text-align: center;
}

#gameArea {
    width: 100%;
    height: 70vh;
    position: relative;
    background: #0f172a;
    overflow: hidden;
}

.target {
    width: 70px;
    height: 70px;
    background: red;
    border-radius: 50%;
    position: absolute;
    display: none;
    cursor: pointer;
}
</style>

</head>
<body>

<nav>
    <h2>🎮 Esports Trainer</h2>
</nav>

<header class="hero">
    <h1>🔥 Pro Aim Trainer</h1>
    <p>Select difficulty and start training</p>
</header>

<section class="cards">

    <div class="card" id="menu">
        <h3>🎯 Choose Level</h3>

        <button onclick="startGame(1)">Level 1 (Normal)</button>
        <button onclick="startGame(2)">Level 2 (Hard)</button>
        <button onclick="startGame(3)">Level 3 (Insane)</button>

    </div>

</section>

<div id="gameArea" style="display:none;">
    <div class="target" id="target"></div>
</div>

<script>
let score = 0;
let startTime;
let levelSpeed = 1000;

function startGame(level) {

    document.getElementById("menu").style.display = "none";
    document.getElementById("gameArea").style.display = "block";

    score = 0;
    startTime = new Date().getTime();

    if (level === 1) levelSpeed = 1000;  // Normal
    if (level === 2) levelSpeed = 600;   // Hard
    if (level === 3) levelSpeed = 300;   // Insane

    spawnTarget(level);
}

function spawnTarget(level) {

    let target = document.getElementById("target");

    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * 400;

    target.style.left = x + "px";
    target.style.top = y + "px";
    target.style.display = "block";

    let hideTime = setTimeout(() => {
        target.style.display = "none";
        spawnTarget(level);
    }, levelSpeed);

    target.onclick = function () {
        clearTimeout(hideTime);

        score++;

        if (score >= 10) {
            endGame();
        } else {
            spawnTarget(level);
        }
    };
}

function endGame() {
    let endTime = new Date().getTime();
    let time = (endTime - startTime) / 1000;

    alert("Game Over!\nTime: " + time + " sec\nScore: " + score);

    location.reload();
}
</script>

</body>
</html>
